<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Juridique Avancé</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        
        #chat-header { background: #4a6fa5; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1em; }
        #lang-select { background: white; border: 1px solid #ccc; border-radius: 5px; padding: 4px 8px; font-size: 14px; cursor: pointer; outline: none; color: #333; }
        
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 14px; }
        .bot-message { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-message { background: #4a6fa5; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        #options-container { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 35vh; }
        button { padding: 12px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; text-align: left; color: #333; }
        button:hover { background: #f8f9fa; border-color: #4a6fa5; }
        
        /* CSS FORMULAIRE */
        .chat-form { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .chat-form input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; }
        .chat-form button.btn-envoyer { background-color: #4a6fa5; color: white; border: none; font-weight: bold; text-align: center; padding: 12px; border-radius: 5px; margin-top: 5px; cursor: pointer; transition: 0.2s;}
        .chat-form button.btn-envoyer:hover { background-color: #385a8a; }
        .chat-form button.btn-envoyer:disabled { background-color: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">
            <span id="header-title">🤖 Conseiller Juridique</span>
            <select id="lang-select" onchange="changerLangue()">
                <option value="fr">🇫🇷 FR</option>
                <option value="en">🇬🇧 EN</option>
                <option value="de">🇩🇪 DE</option>
                <option value="it">🇮🇹 IT</option>
            </select>
        </div>
        <div id="chat-box"></div>
        <div id="options-container"></div>
    </div>

                rep_depot: "<b>⚖️ Ce que disent les textes :</b><br>- <b>Loi n°89-462 du 6 juillet 1989 (Art. 22)</b> : Le dépôt de garantie doit être restitué dans un délai de 1 mois si l'état des lieux de sortie est conforme, ou de 2 mois en cas de dégradations. Toute retenue doit être justifiée. En cas de retard, une majoration de 10% du loyer mensuel hors charges s'applique par mois de retard.",

                rep_voisinage: "<b>⚖️ Ce que disent les textes :</b><br>- <b>Loi n°89-462 du 6 juillet 1989 (Art. 7)</b> : Le locataire a l'obligation d'user paisiblement des locaux loués.<br>- <b>Article 6-1 (Loi 1989)</b> : Après mise en demeure, le bailleur est tenu d'utiliser les droits dont il dispose pour faire cesser les troubles de voisinage causés par son locataire.",

                btn_proprio: "🏠 Landlords", btn_locataire: "🔑 Tenants", btn_vendeur: "🤝 Sellers", btn_acheteur: "🛒 Buyers", btn_succession: "📜 Estate",
                menu_proprio: "Alright. What problem are you facing with your tenant?",
                pb_loyers: "💶 Unpaid rent", pb_depot: "💰 Security deposit", pb_travaux: "🔨 Repair works", pb_degradations: "🏚️ Property damage", pb_voisinage: "🔊 Neighborhood disturbances", pb_assurance: "📄 Lack of insurance", pb_sousloc: "🚫 Unauthorized subletting", pb_refus: "🚪 Refusal to leave",
                btn_retour_debut: "⬅️ Return to start", btn_retour_menu: "⬅️ Return to menu", btn_recommencer: "🔄 Start over", bientot: "<i>Under construction!</i>",
                
                rep_loyers: "<b>⚖️ What the French Law says:</b><br>- <b>Civil Code (Art. 1728)</b>: The tenant must pay the rent at agreed terms.<br>- <b>Law of July 6, 1989 (Art. 7)</b>: The tenant must pay rent and recoverable charges. You can initiate a formal notice process via a bailiff.",
                rep_depot: "<b>⚖️ What the French Law says:</b><br>- <b>Law of July 6, 1989 (Art. 22)</b>: Deposit must be returned within 1 month if exit inventory is clean, or 2 months if damaged. Deductions must be justified. A 10% penalty of the rent per month applies for delays.",
                rep_travaux: "<b>⚖️ What the French Law says:</b><br>- <b>Civil Code (Art. 1720) & Law of 1989 (Art. 6)</b>: The landlord handles major repairs and obsolescence.<br>- <b>Law of 1989 (Art. 7)</b>: The tenant is responsible for routine maintenance and minor repairs.",
                rep_degradations: "<b>⚖️ What the French Law says:</b><br>- <b>Law of July 6, 1989 (Art. 7)</b>: The tenant is liable for damages occurring during the lease unless proven to be caused by force majeure, the landlord, or a third party.",
                rep_voisinage: "<b>⚖️ What the French Law says:</b><br>- <b>Law of July 6, 1989 (Art. 7 & 6-1)</b>: The tenant must use the premises peacefully. The landlord, after formal notice, must use their rights to stop neighborhood disturbances caused by the tenant.",
                rep_assurance: "<b>⚖️ What the French Law says:</b><br>- <b>Law of July 6, 1989 (Art. 7)</b>: The tenant must insure against rental risks. Failing this, the landlord can terminate the lease or take out insurance on their behalf.",
                rep_sousloc: "<b>⚖️ What the French Law says:</b><br>- <b>Law of July 6, 1989 (Art. 8)</b>: The tenant cannot sublet without the landlord's written agreement. Sublet rent cannot exceed the main rent.",
                rep_refus: "<b>⚖️ What the French Law says:</b><br>- <b>Law of July 6, 1989 (Art. 15)</b>: At the end of the notice period, the tenant loses all occupation rights. If they remain, the landlord must apply to the court for an eviction order.",
                
                contact_q: "Would you like to be contacted for free by an expert?",
                contact_oui: "✅ Yes", contact_non: "❌ No", form_intro: "Please fill out this form:", form_nom: "Last Name", form_prenom: "First Name", form_tel: "Phone", form_email: "Email", form_btn: "Send", form_sending: "Sending...", form_user: "My details.", form_merci: "✅ Sent successfully.", form_erreur: "❌ Error."
            },

                accueil: "Hallo! Bitte wählen Sie Ihr Profil:",
                btn_proprio: "🏠 Vermieter", btn_locataire: "🔑 Mieter", btn_vendeur: "🤝 Verkäufer", btn_acheteur: "🛒 Käufer", btn_succession: "📜 Nachlass",

                btn_retour_debut: "⬅️ Zurück zum Start", btn_retour_menu: "⬅️ Zurück", btn_recommencer: "🔄 Neustart", bientot: "<i>In Bearbeitung!</i>",

                rep_degradations: "<b>⚖️ Französisches Recht:</b><br>- <b>Gesetz vom 6. Juli 1989 (Art. 7)</b>: Der Mieter haftet für Schäden während der Mietzeit, außer bei höherer Gewalt oder Fremdverschulden.",
                rep_voisinage: "<b>⚖️ Französisches Recht:</b><br>- <b>Gesetz vom 6. Juli 1989 (Art. 7 & 6-1)</b>: Der Vermieter muss nach Abmahnung rechtliche Schritte einleiten, um Lärmbelästigungen durch seinen Mieter zu stoppen.",
                rep_assurance: "<b>⚖️ Französisches Recht:</b><br>- <b>Gesetz vom 6. Juli 1989 (Art. 7)</b>: Der Mieter muss eine Hausratversicherung nachweisen. Sonst kann der Vermieter kündigen.",
                rep_sousloc: "<b>⚖️ Französisches Recht:</b><br>- <b>Gesetz vom 6. Juli 1989 (Art. 8)</b>: Untervermietung erfordert die schriftliche Zustimmung des Vermieters.",
                rep_refus: "<b>⚖️ Französisches Recht:</b><br>- <b>Gesetz vom 6. Juli 1989 (Art. 15)</b>: Nach Kündigung verliert der Mieter das Wohnrecht. Ein Räumungsverfahren muss gerichtlich eingeleitet werden.",
                
                contact_q: "Expertenkontakt gewünscht?",
                contact_oui: "✅ Ja", contact_non: "❌ Nein", form_intro: "Bitte ausfüllen:", form_nom: "Nachname", form_prenom: "Vorname", form_tel: "Telefon", form_email: "E-Mail", form_btn: "Senden", form_sending: "Wird gesendet...", form_user: "Meine Daten.", form_merci: "✅ Erfolgreich gesendet.", form_erreur: "❌ Fehler."
            },
            it: {
                header: "🤖 Consulente Legale",
                disclaimer: "<br><br><i>* Avvertenza: Sono un assistente virtuale. Non sono un giurista. Queste informazioni sono fornite a titolo indicativo.</i>",
                accueil: "Ciao! Seleziona il tuo profilo:",

                menu_proprio: "Che problema riscontri con il tuo inquilino?",
                pb_loyers: "💶 Affitti non pagati", pb_depot: "💰 Deposito cauzionale", pb_travaux: "🔨 Ripartizione lavori", pb_degradations: "🏚️ Danni", pb_voisinage: "🔊 Disturbi vicinato", pb_assurance: "📄 Mancanza assicurazione", pb_sousloc: "🚫 Subaffitto non autorizzato", pb_refus: "🚪 Rifiuto di uscire",
                btn_retour_debut: "⬅️ Torna all'inizio", btn_retour_menu: "⬅️ Indietro", btn_recommencer: "🔄 Ricomincia", bientot: "<i>In costruzione!</i>",
                
                rep_loyers: "<b>⚖️ Diritto Francese:</b><br>- <b>Codice civile (Art. 1728) & Legge del 6 luglio 1989 (Art. 7)</b>: L'inquilino deve pagare affitto e spese. Puoi avviare una procedura di ingiunzione tramite ufficiale giudiziario.",
                rep_depot: "<b>⚖️ Diritto Francese:</b><br>- <b>Legge del 6 luglio 1989 (Art. 22)</b>: Restituzione in 1 mese (senza danni) o 2 mesi (con danni). Penale del 10% dell'affitto per ogni mese di ritardo.",
                rep_travaux: "<b>⚖️ Diritto Francese:</b><br>- <b>Codice civile (Art. 1720) & Legge 1989 (Art. 6)</b>: Il locatore paga le grandi riparazioni.<br>- <b>Legge 1989 (Art. 7)</b>: L'inquilino paga la piccola manutenzione.",
                rep_degradations: "<b>⚖️ Diritto Francese:</b><br>- <b>Legge del 6 luglio 1989 (Art. 7)</b>: L'inquilino è responsabile dei danni verificatisi, tranne in caso di forza maggiore.",
                rep_voisinage: "<b>⚖️ Diritto Francese:</b><br>- <b>Legge del 6 luglio 1989 (Art. 7 & 6-1)</b>: Il locatore, previa diffida, deve far cessare i disturbi del vicinato causati dall'inquilino.",
                rep_assurance: "<b>⚖️ Diritto Francese:</b><br>- <b>Legge del 6 luglio 1989 (Art. 7)</b>: L'inquilino deve assicurarsi. In mancanza, il locatore può rescindere il contratto.",
                rep_sousloc: "<b>⚖️ Diritto Francese:</b><br>- <b>Legge del 6 luglio 1989 (Art. 8)</b>: Il subaffitto richiede il consenso scritto del locatore.",
                rep_refus: "<b>⚖️ Diritto Francese:</b><br>- <b>Legge del 6 luglio 1989 (Art. 15)</b>: A fine preavviso, l'inquilino perde il diritto di abitare. Occorre avviare una procedura di sfratto giudiziale.",
                
                contact_q: "Vuoi essere contattato da un esperto?",
                contact_oui: "✅ Sì", contact_non: "❌ No", form_intro: "Compila il modulo:", form_nom: "Cognome", form_prenom: "Nome", form_tel: "Telefono", form_email: "E-mail", form_btn: "Invia", form_sending: "Invio...", form_user: "I miei dati.", form_merci: "✅ Inviato con successo.", form_erreur: "❌ Errore."
            }
        };

        function changerLangue() {
            const select = document.getElementById('lang-select');
            currentLang = select.value;
            document.getElementById('header-title').innerText = texts[currentLang].header;
            document.documentElement.lang = currentLang; 
            
            chatBox.innerHTML = '';
            optionsContainer.innerHTML = '';
            historiqueConversation = ""; 
            etapeAccueil();
        }

        function stripHtml(html) {
            let tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        }

        function addMessage(text, sender) {
            if(!text.includes('<input')) { 
                historiqueConversation += (sender === 'bot' ? '🤖 Bot : ' : '👤 Client : ') + stripHtml(text) + '\n\n';
            }

            const div = document.createElement('div');
            div.className = 'message ' + (sender === 'bot' ? 'bot-message' : 'user-message');
            if (text.includes('<div') || text.includes('<br>')) {
                div.innerHTML = text;
            } else {
                div.innerHTML = text.replace(/\n/g, '<br>'); 
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight; 
        }

        function showOptions(options) {
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerHTML = opt.label;
                btn.onclick = () => {
                    addMessage(opt.label, 'user'); 
                    optionsContainer.innerHTML = ''; 
                    setTimeout(opt.action, 500); 
                };
                optionsContainer.appendChild(btn);
            });
        }

        // --- ARBORESCENCE ---
        function etapeAccueil() {
            addMessage(texts[currentLang].accueil, 'bot');
            showOptions([
                { label: texts[currentLang].btn_proprio, action: etapeProprietaire },
                { label: texts[currentLang].btn_locataire, action: () => afficherBientot() },
                { label: texts[currentLang].btn_vendeur, action: () => afficherBientot() },
                { label: texts[currentLang].btn_acheteur, action: () => afficherBientot() },
                { label: texts[currentLang].btn_succession, action: () => afficherBientot() }
            ]);
        }

        function etapeProprietaire() {
            addMessage(texts[currentLang].menu_proprio, 'bot');
            showOptions([
                { label: texts[currentLang].pb_loyers, action: repLoyersImpayes },
                { label: texts[currentLang].pb_depot, action: repDepotGarantie },
                { label: texts[currentLang].pb_travaux, action: repTravaux },
                { label: texts[currentLang].pb_degradations, action: repDegradations },
                { label: texts[currentLang].pb_voisinage, action: repVoisinage },
                { label: texts[currentLang].pb_assurance, action: repAssurance },
                { label: texts[currentLang].pb_sousloc, action: repSousloc },
                { label: texts[currentLang].pb_refus, action: repRefus },
                { label: texts[currentLang].btn_retour_debut, action: etapeAccueil }
            ]);
        }

        // --- ENVOI FORMULAIRE ---
        function proposerContact(actionRetour) {
            addMessage(texts[currentLang].contact_q, 'bot');
            showOptions([
                { label: texts[currentLang].contact_oui, action: () => afficherFormulaire(actionRetour) },
                { label: texts[currentLang].contact_non, action: () => afficherOptionsFin(actionRetour) }
            ]);
        }

        function afficherFormulaire(actionRetour) {
            const formHTML = `
                ${texts[currentLang].form_intro}
                <div class="chat-form">
                    <input type="text" id="form-nom" placeholder="${texts[currentLang].form_nom}">
                    <input type="text" id="form-prenom" placeholder="${texts[currentLang].form_prenom}">
                    <input type="tel" id="form-tel" placeholder="${texts[currentLang].form_tel}">
                    <input type="email" id="form-email" placeholder="${texts[currentLang].form_email}">
                    <button class="btn-envoyer" id="btn-submit" onclick="validerFormulaire()">${texts[currentLang].form_btn}</button>
                </div>
            `;
            addMessage(formHTML, 'bot');
            optionsContainer.innerHTML = ''; 
            window.actionRetourActuelle = actionRetour;
        }

        window.validerFormulaire = function() {
            const nom = document.getElementById('form-nom').value;
            const prenom = document.getElementById('form-prenom').value;
            const tel = document.getElementById('form-tel').value;
            const email = document.getElementById('form-email').value;

            if(!nom || !tel || !email) {
                alert("Merci de remplir au moins votre nom, téléphone et adresse e-mail.");
                return;
            }

            const btn = document.getElementById('btn-submit');
            if(btn) { btn.disabled = true; btn.innerText = texts[currentLang].form_sending; }

            addMessage(texts[currentLang].form_user, 'user');
            
            const data = {
                _subject: "Nouveau Lead - Chatbot Juridique",
                Nom: nom, Prenom: prenom, Telephone: tel, Email: email,
                Historique_Conversation: historiqueConversation
            };

            fetch("https://formsubmit.co/ajax/laura.zeisser@gmail.com", {
                method: "POST",
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                setTimeout(() => {
                    addMessage(texts[currentLang].form_merci, 'bot');
                    afficherOptionsFin(window.actionRetourActuelle);
                }, 1000);
            })
            .catch(error => {
                addMessage(texts[currentLang].form_erreur, 'bot');
                if(btn) { btn.disabled = false; btn.innerText = texts[currentLang].form_btn; }
            });
        }

        function afficherOptionsFin(actionRetour) {
            showOptions([
                { label: texts[currentLang].btn_retour_menu, action: actionRetour },
                { label: texts[currentLang].btn_recommencer, action: etapeAccueil }
            ]);
        }

        // --- REPONSES JURIDIQUES (Intégrées avec Code civil et Loi 1989) ---
        function repLoyersImpayes() { addMessage(texts[currentLang].rep_loyers + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }
        function repDepotGarantie() { addMessage(texts[currentLang].rep_depot + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }
        function repTravaux() { addMessage(texts[currentLang].rep_travaux + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }
        function repDegradations() { addMessage(texts[currentLang].rep_degradations + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }
        function repVoisinage() { addMessage(texts[currentLang].rep_voisinage + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }
        function repAssurance() { addMessage(texts[currentLang].rep_assurance + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }
        function repSousloc() { addMessage(texts[currentLang].rep_sousloc + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }
        function repRefus() { addMessage(texts[currentLang].rep_refus + texts[currentLang].disclaimer, 'bot'); setTimeout(() => proposerContact(etapeProprietaire), 1000); }

        function afficherBientot() {
            addMessage(texts[currentLang].bientot, 'bot');
            showOptions([{ label: texts[currentLang].btn_retour_debut, action: etapeAccueil }]);
        }

        // Initialisation
        document.getElementById('header-title').innerText = texts[currentLang].header;
        etapeAccueil();
    </script>

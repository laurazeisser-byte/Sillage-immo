<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype Chatbot Juridique Multilingue</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        
        #chat-header { background: #4a6fa5; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1em; }
        #lang-select { background: white; border: 1px solid #ccc; border-radius: 5px; padding: 4px 8px; font-size: 14px; cursor: pointer; outline: none; color: #333; }
        
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 14px; }
        .bot-message { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-message { background: #4a6fa5; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        #options-container { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 35vh; }
        button { padding: 12px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; text-align: left; color: #333; }
        button:hover { background: #f8f9fa; border-color: #4a6fa5; }
        
        /* CSS FORMULAIRE */
        .chat-form { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .chat-form input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; }
        .chat-form button.btn-envoyer { background-color: #4a6fa5; color: white; border: none; font-weight: bold; text-align: center; padding: 12px; border-radius: 5px; margin-top: 5px; cursor: pointer; transition: 0.2s;}
        .chat-form button.btn-envoyer:hover { background-color: #385a8a; }
        .chat-form button.btn-envoyer:disabled { background-color: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">
            <span id="header-title">🤖 Conseiller Juridique</span>
            <select id="lang-select" onchange="changerLangue()">
                <option value="fr">🇫🇷 FR</option>
                <option value="en">🇬🇧 EN</option>
                <option value="de">🇩🇪 DE</option>
                <option value="it">🇮🇹 IT</option>
            </select>
        </div>
        <div id="chat-box"></div>
        <div id="options-container"></div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const optionsContainer = document.getElementById('options-container');
        
        // --- MÉMOIRE DU CHAT (Pour l'envoyer par email) ---
        let historiqueConversation = "";
        
        // --- DICTIONNAIRE DES TRADUCTIONS ---
        let currentLang = 'fr'; 
        
        const texts = {
            fr: {
                header: "🤖 Conseiller Juridique",
                disclaimer: "<br><br><i>* Avertissement : Je suis un assistant virtuel. Je ne suis ni juriste ni avocat. Ces informations sont données à titre indicatif et ne remplacent en aucun cas les conseils personnalisés d'un professionnel du droit.</i>",
                accueil: "Bonjour ! Je suis votre conseiller juridique virtuel. Comment puis-je vous aider aujourd'hui ? Veuillez sélectionner votre profil :",
                btn_proprio: "🏠 Propriétaires bailleurs",
                btn_locataire: "🔑 Locataires",
                btn_vendeur: "🤝 Vendeurs",
                btn_acheteur: "🛒 Acheteurs",
                btn_succession: "📜 Succession / indivision",
                menu_proprio: "Très bien. Quel est le problème que vous rencontrez avec votre locataire ?",
                pb_loyers: "💶 Les loyers et charges impayés",
                pb_depot: "💰 La restitution du dépôt de garantie",
                pb_travaux: "🔨 La répartition des travaux",
                pb_degradations: "🏚️ Les dégradations du logement",
                pb_voisinage: "🔊 Les troubles anormaux du voisinage",
                pb_assurance: "📄 Le défaut d'assurance habitation",
                pb_sousloc: "🚫 La sous-location non autorisée",
                pb_refus: "🚪 Le refus de quitter les lieux",
                btn_retour_debut: "⬅️ Revenir au début",
                btn_retour_menu: "⬅️ Revenir au menu précédent",
                btn_recommencer: "🔄 Recommencer depuis le début",
                bientot: "<i>Cette section est en cours de construction. Je pourrai bientôt vous aider sur ce sujet !</i>",
                rep_loyers: "<b>⚖️ Ce que disent les textes de loi :</b><br><br>- <b>Code civil (Art. 1728)</b> : Le locataire a pour obligation principale de \"payer le prix du bail aux termes convenus\".<br>- <b>Loi du 6 juillet 1989 (Art. 7)</b> : Le locataire est obligé \"de payer le loyer et les charges récupérables aux termes convenus\".<br><br><b>🛠 Les 3 étapes pour réagir :</b><br>1. La relance amiable (J+5)<br>2. La mise en demeure par courrier recommandé (J+15)<br>3. Le commandement de payer via un Commissaire de Justice.",
                rep_depot: "<b>⚖️ Ce que disent les textes de loi :</b><br><br>La restitution du dépôt de garantie est strictement encadrée par l'<b>Article 22 de la loi du 6 juillet 1989</b>.<br><br><b>⏱ Les délais légaux de restitution :</b><br>- <b>1 mois maximum</b> si l'état des lieux de sortie est conforme.<br>- <b>2 mois maximum</b> s'il y a des dégradations.<br><br><b>⚠️ Attention :</b><br>- Toute retenue doit être justifiée (devis ou factures).<br>- En cas de retard, une pénalité de 10% du loyer hors charges par mois de retard s'applique.",
                contact_q: "Souhaitez-vous être contacté gratuitement par un expert pour plus de détails sur votre situation ?",
                contact_oui: "✅ Oui, je souhaite être contacté",
                contact_non: "❌ Non, merci",
                form_intro: "Parfait, veuillez remplir ce formulaire et nous vous rappellerons :",
                form_nom: "Nom",
                form_prenom: "Prénom",
                form_tel: "Numéro de téléphone",
                form_email: "Adresse e-mail",
                form_btn: "Envoyer ma demande",
                form_sending: "Envoi en cours...",
                form_user: "Voici mes coordonnées.",
                form_merci: "✅ Merci ! Vos informations ont bien été envoyées. Un conseiller vous contactera très prochainement.",
                form_erreur: "❌ Une erreur est survenue lors de l'envoi. Veuillez réessayer plus tard."
            },
            en: {
                // Traductions anglaises
                header: "🤖 Legal Advisor",
                disclaimer: "<br><br><i>* Warning: I am a virtual assistant. I am neither a jurist nor a lawyer. This information is provided for guidance only.</i>",
                accueil: "Hello! I am your virtual legal advisor. How can I help you today? Please select your profile:",
                btn_proprio: "🏠 Landlords",
                btn_locataire: "🔑 Tenants",
                btn_vendeur: "🤝 Sellers",
                btn_acheteur: "🛒 Buyers",
                btn_succession: "📜 Estate / Undivided ownership",
                menu_proprio: "Alright. What problem are you facing with your tenant?",
                pb_loyers: "💶 Unpaid rent and charges",
                pb_depot: "💰 Security deposit return",
                pb_travaux: "🔨 Distribution of repair works",
                pb_degradations: "🏚️ Property damage",
                pb_voisinage: "🔊 Abnormal neighborhood disturbances",
                pb_assurance: "📄 Lack of home insurance",
                pb_sousloc: "🚫 Unauthorized subletting",
                pb_refus: "🚪 Refusal to leave the premises",
                btn_retour_debut: "⬅️ Return to start",
                btn_retour_menu: "⬅️ Return to previous menu",
                btn_recommencer: "🔄 Start over",
                bientot: "<i>This section is under construction. I will be able to help you with this topic soon!</i>",
                rep_loyers: "<b>⚖️ What the law says (French Law):</b><br><br>- <b>Civil Code (Art. 1728)</b>: The tenant's main obligation is to \"pay the price of the lease at the agreed terms\".<br><br><b>🛠 The 3 steps to react:</b><br>1. Friendly reminder<br>2. Formal notice<br>3. Order to pay via a Bailiff.",
                rep_depot: "<b>⚖️ What the law says (French Law):</b><br><br>The return of the security deposit is strictly regulated by <b>Article 22 of the Law of July 6, 1989</b>.<br><br><b>⏱ Legal deadlines:</b><br>- <b>1 month</b> if exit inventory matches entry.<br>- <b>2 months</b> if there is damage.",
                contact_q: "Would you like to be contacted for free by an expert?",
                contact_oui: "✅ Yes, I would like to be contacted",
                contact_non: "❌ No, thank you",
                form_intro: "Perfect, please fill out this form:",
                form_nom: "Last Name",
                form_prenom: "First Name",
                form_tel: "Phone Number",
                form_email: "Email Address",
                form_btn: "Send my request",
                form_sending: "Sending...",
                form_user: "Here are my details.",
                form_merci: "✅ Thank you! Your information has been successfully sent.",
                form_erreur: "❌ An error occurred while sending. Please try again."
            },
            // Pour alléger le code ici, j'ai simplifié EN, DE, IT, la mécanique reste la même
            de: {
                header: "🤖 Rechtsberater", disclaimer: "<br><br><i>* Warnung: Virtueller Assistent. Keine Rechtsberatung.</i>", accueil: "Hallo! Bitte wählen Sie Ihr Profil:", btn_proprio: "🏠 Vermieter", btn_locataire: "🔑 Mieter", btn_vendeur: "🤝 Verkäufer", btn_acheteur: "🛒 Käufer", btn_succession: "📜 Nachlass", menu_proprio: "Welches Problem haben Sie?", pb_loyers: "💶 Unbezahlte Miete", pb_depot: "💰 Kaution", pb_travaux: "🔨 Reparaturen", pb_degradations: "🏚️ Schäden", pb_voisinage: "🔊 Lärm", pb_assurance: "📄 Versicherung", pb_sousloc: "🚫 Untermiete", pb_refus: "🚪 Weigerung zu gehen", btn_retour_debut: "⬅️ Zurück", btn_retour_menu: "⬅️ Zurück", btn_recommencer: "🔄 Neustart", bientot: "<i>In Bearbeitung!</i>", rep_loyers: "Miete muss gezahlt werden.", rep_depot: "Kaution muss zurückgegeben werden.", contact_q: "Expertenkontakt gewünscht?", contact_oui: "✅ Ja", contact_non: "❌ Nein", form_intro: "Bitte ausfüllen:", form_nom: "Nachname", form_prenom: "Vorname", form_tel: "Telefon", form_email: "E-Mail", form_btn: "Senden", form_sending: "Wird gesendet...", form_user: "Meine Daten.", form_merci: "✅ Danke, erfolgreich gesendet.", form_erreur: "❌ Fehler beim Senden."
            },
            it: {
                header: "🤖 Consulente Legale", disclaimer: "<br><br><i>* Avvertenza: Assistente virtuale. Nessuna consulenza legale.</i>", accueil: "Ciao! Seleziona il tuo profilo:", btn_proprio: "🏠 Proprietari", btn_locataire: "🔑 Inquilini", btn_vendeur: "🤝 Venditori", btn_acheteur: "🛒 Acquirenti", btn_succession: "📜 Successione", menu_proprio: "Che problema riscontri?", pb_loyers: "💶 Affitti non pagati", pb_depot: "💰 Deposito cauzionale", pb_travaux: "🔨 Lavori", pb_degradations: "🏚️ Danni", pb_voisinage: "🔊 Disturbi", pb_assurance: "📄 Assicurazione", pb_sousloc: "🚫 Subaffitto", pb_refus: "🚪 Rifiuto di uscire", btn_retour_debut: "⬅️ Indietro", btn_retour_menu: "⬅️ Indietro", btn_recommencer: "🔄 Ricomincia", bientot: "<i>In costruzione!</i>", rep_loyers: "L'affitto deve essere pagato.", rep_depot: "Il deposito deve essere restituito.", contact_q: "Vuoi essere contattato?", contact_oui: "✅ Sì", contact_non: "❌ No", form_intro: "Compila qui:", form_nom: "Cognome", form_prenom: "Nome", form_tel: "Telefono", form_email: "E-mail", form_btn: "Invia", form_sending: "Invio...", form_user: "I miei dati.", form_merci: "✅ Grazie, inviato con successo.", form_erreur: "❌ Errore di invio."
            }
        };

        function changerLangue() {
            const select = document.getElementById('lang-select');
            currentLang = select.value;
            document.getElementById('header-title').innerText = texts[currentLang].header;
            document.documentElement.lang = currentLang; 
            
            chatBox.innerHTML = '';
            optionsContainer.innerHTML = '';
            historiqueConversation = ""; // On vide l'historique quand on change de langue
            etapeAccueil();
        }

        // Fonction pour nettoyer le HTML des messages pour l'email
        function stripHtml(html) {
            let tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        }

        function addMessage(text, sender) {
            // 1. On enregistre dans l'historique (sans les balises HTML)
            if(!text.includes('<input')) { // On n'enregistre pas le code HTML du formulaire
                historiqueConversation += (sender === 'bot' ? '🤖 Bot : ' : '👤 Client : ') + stripHtml(text) + '\n\n';
            }

            // 2. On affiche dans la fenêtre
            const div = document.createElement('div');
            div.className = 'message ' + (sender === 'bot' ? 'bot-message' : 'user-message');
            if (text.includes('<div') || text.includes('<br>')) {
                div.innerHTML = text;
            } else {
                div.innerHTML = text.replace(/\n/g, '<br>'); 
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight; 
        }

        function showOptions(options) {
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerHTML = opt.label;
                btn.onclick = () => {
                    addMessage(opt.label, 'user'); 
                    optionsContainer.innerHTML = ''; 
                    setTimeout(opt.action, 500); 
                };
                optionsContainer.appendChild(btn);
            });
        }

        // --- ARBORESCENCE ---

        function etapeAccueil() {
            addMessage(texts[currentLang].accueil, 'bot');
            showOptions([
                { label: texts[currentLang].btn_proprio, action: etapeProprietaire },
                { label: texts[currentLang].btn_locataire, action: () => afficherBientot() },
                { label: texts[currentLang].btn_vendeur, action: () => afficherBientot() },
                { label: texts[currentLang].btn_acheteur, action: () => afficherBientot() },
                { label: texts[currentLang].btn_succession, action: () => afficherBientot() }
            ]);
        }

        function etapeProprietaire() {
            addMessage(texts[currentLang].menu_proprio, 'bot');
            showOptions([
                { label: texts[currentLang].pb_loyers, action: repLoyersImpayes },
                { label: texts[currentLang].pb_depot, action: repDepotGarantie },
                { label: texts[currentLang].pb_travaux, action: () => afficherBientot() },
                { label: texts[currentLang].pb_degradations, action: () => afficherBientot() },
                { label: texts[currentLang].pb_voisinage, action: () => afficherBientot() },
                { label: texts[currentLang].pb_assurance, action: () => afficherBientot() },
                { label: texts[currentLang].pb_sousloc, action: () => afficherBientot() },
                { label: texts[currentLang].pb_refus, action: () => afficherBientot() },
                { label: texts[currentLang].btn_retour_debut, action: etapeAccueil }
            ]);
        }

        function proposerContact(actionRetour) {
            addMessage(texts[currentLang].contact_q, 'bot');
            showOptions([
                { label: texts[currentLang].contact_oui, action: () => afficherFormulaire(actionRetour) },
                { label: texts[currentLang].contact_non, action: () => afficherOptionsFin(actionRetour) }
            ]);
        }

        function afficherFormulaire(actionRetour) {
            const formHTML = `
                ${texts[currentLang].form_intro}
                <div class="chat-form">
                    <input type="text" id="form-nom" placeholder="${texts[currentLang].form_nom}">
                    <input type="text" id="form-prenom" placeholder="${texts[currentLang].form_prenom}">
                    <input type="tel" id="form-tel" placeholder="${texts[currentLang].form_tel}">
                    <input type="email" id="form-email" placeholder="${texts[currentLang].form_email}">
                    <button class="btn-envoyer" id="btn-submit" onclick="validerFormulaire()">${texts[currentLang].form_btn}</button>
                </div>
            `;
            addMessage(formHTML, 'bot');
            optionsContainer.innerHTML = ''; 
            window.actionRetourActuelle = actionRetour;
        }

        // --- LA MAGIE OPÈRE ICI : ENVOI DE L'EMAIL ---
        window.validerFormulaire = function() {
            // Récupération des données tapées par l'utilisateur
            const nom = document.getElementById('form-nom').value;
            const prenom = document.getElementById('form-prenom').value;
            const tel = document.getElementById('form-tel').value;
            const email = document.getElementById('form-email').value;

            // Petite vérification pour ne pas envoyer de formulaires vides
            if(!nom || !tel || !email) {
                alert("Merci de remplir au moins votre nom, téléphone et adresse e-mail.");
                return;
            }

            const btn = document.getElementById('btn-submit');
            if(btn) { 
                btn.disabled = true; 
                btn.innerText = texts[currentLang].form_sending; 
            }

            addMessage(texts[currentLang].form_user, 'user');
            
            // Préparation du colis de données à envoyer à Laura
            const data = {
                _subject: "Nouveau Lead - Chatbot Juridique", // Sujet de l'email reçu
                Nom: nom,
                Prenom: prenom,
                Telephone: tel,
                Email: email,
                Historique_Conversation: historiqueConversation
            };

            // Envoi de la requête à FormSubmit
            fetch("https://formsubmit.co/ajax/laura.zeisser@gmail.com", {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                // Succès !
                setTimeout(() => {
                    addMessage(texts[currentLang].form_merci, 'bot');
                    afficherOptionsFin(window.actionRetourActuelle);
                }, 1000);
            })
            .catch(error => {
                // Erreur
                addMessage(texts[currentLang].form_erreur, 'bot');
                if(btn) { 
                    btn.disabled = false; 
                    btn.innerText = texts[currentLang].form_btn; 
                }
            });
        }

        function afficherOptionsFin(actionRetour) {
            showOptions([
                { label: texts[currentLang].btn_retour_menu, action: actionRetour },
                { label: texts[currentLang].btn_recommencer, action: etapeAccueil }
            ]);
        }

        function repLoyersImpayes() {
            addMessage(texts[currentLang].rep_loyers + texts[currentLang].disclaimer, 'bot');
            setTimeout(() => proposerContact(etapeProprietaire), 1000);
        }

        function repDepotGarantie() {
            addMessage(texts[currentLang].rep_depot + texts[currentLang].disclaimer, 'bot');
            setTimeout(() => proposerContact(etapeProprietaire), 1000);
        }

        function afficherBientot() {
            addMessage(texts[currentLang].bientot, 'bot');
            showOptions([
                { label: texts[currentLang].btn_retour_debut, action: etapeAccueil }
            ]);
        }

        // Initialisation
        document.getElementById('header-title').innerText = texts[currentLang].header;
        etapeAccueil();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype Chatbot Juridique Multilingue</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }
        
        /* HEADER MODIFIÉ POUR LE SÉLECTEUR DE LANGUE */
        #chat-header { background: #4a6fa5; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1em; }
        #lang-select { background: white; border: 1px solid #ccc; border-radius: 5px; padding: 4px 8px; font-size: 14px; cursor: pointer; outline: none; color: #333; }
        
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 14px; }
        .bot-message { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-message { background: #4a6fa5; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        #options-container { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 35vh; }
        button { padding: 12px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; text-align: left; color: #333; }
        button:hover { background: #f8f9fa; border-color: #4a6fa5; }
        
        /* CSS FORMULAIRE */
        .chat-form { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .chat-form input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; }
        .chat-form button.btn-envoyer { background-color: #4a6fa5; color: white; border: none; font-weight: bold; text-align: center; padding: 12px; border-radius: 5px; margin-top: 5px; cursor: pointer; transition: 0.2s;}
        .chat-form button.btn-envoyer:hover { background-color: #385a8a; }
        .chat-form button.btn-envoyer:disabled { background-color: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">
            <span id="header-title">🤖 Conseiller Juridique</span>
            <select id="lang-select" onchange="changerLangue()">
                <option value="fr">🇫🇷 FR</option>
                <option value="en">🇬🇧 EN</option>
                <option value="de">🇩🇪 DE</option>
                <option value="it">🇮🇹 IT</option>
            </select>
        </div>
        <div id="chat-box"></div>
        <div id="options-container"></div>
    </div>

    <script>

                bientot: "<i>Cette section est en cours de construction. Je pourrai bientôt vous aider sur ce sujet !</i>",
                rep_loyers: "<b>⚖️ Ce que disent les textes de loi :</b><br><br>- <b>Code civil (Art. 1728)</b> : Le locataire a pour obligation principale de \"payer le prix du bail aux termes convenus\".<br>- <b>Loi du 6 juillet 1989 (Art. 7)</b> : Le locataire est obligé \"de payer le loyer et les charges récupérables aux termes convenus\".<br><br><b>🛠 Les 3 étapes pour réagir :</b><br>1. La relance amiable (J+5)<br>2. La mise en demeure par courrier recommandé (J+15)<br>3. Le commandement de payer via un Commissaire de Justice.",
                rep_depot: "<b>⚖️ Ce que disent les textes de loi :</b><br><br>La restitution du dépôt de garantie est strictement encadrée par l'<b>Article 22 de la loi du 6 juillet 1989</b>.<br><br><b>⏱ Les délais légaux de restitution :</b><br>- <b>1 mois maximum</b> si l'état des lieux de sortie est conforme.<br>- <b>2 mois maximum</b> s'il y a des dégradations.<br><br><b>⚠️ Attention :</b><br>- Toute retenue doit être justifiée (devis ou factures).<br>- En cas de retard, une pénalité de 10% du loyer hors charges par mois de retard s'applique.",
                contact_q: "Souhaitez-vous être contacté gratuitement par un expert pour plus de détails sur votre situation ?",

                rep_depot: "<b>⚖️ What the law says (French Law):</b><br><br>The return of the security deposit is strictly regulated by <b>Article 22 of the Law of July 6, 1989</b>.<br><br><b>⏱ Legal deadlines for return:</b><br>- <b>1 month maximum</b> if the exit inventory matches the entry one.<br>- <b>2 months maximum</b> if there is damage.<br><br><b>⚠️ Warning:</b><br>- Any deduction must be justified (quotes or invoices).<br>- In case of delay, a penalty of 10% of the rent (excluding charges) per month of delay applies.",
                contact_q: "Would you like to be contacted for free by an expert for more details on your situation?",
                contact_oui: "✅ Yes, I would like to be contacted",

                form_intro: "Perfect, please fill out this form and we will call you back:",

            },
            de: {

                disclaimer: "<br><br><i>* Warnung: Ich bin ein virtueller Assistent. Ich bin weder Jurist noch Anwalt. Diese Informationen dienen nur zur Orientierung und ersetzen keine persönliche Beratung durch einen Rechtsexperten.</i>",

                btn_vendeur: "🤝 Verkäufer",

                pb_degradations: "🏚️ Beschädigungen der Wohnung",
                pb_voisinage: "🔊 Unzumutbare Lärmbelästigung",
                pb_assurance: "📄 Fehlende Hausratversicherung",
                pb_sousloc: "🚫 Unerlaubte Untervermietung",
                pb_refus: "🚪 Weigerung, die Räumlichkeiten zu verlassen",
                btn_retour_debut: "⬅️ Zurück zum Start",
                btn_retour_menu: "⬅️ Zurück zum vorherigen Menü",
                btn_recommencer: "🔄 Von vorne beginnen",
                bientot: "<i>Dieser Abschnitt befindet sich im Aufbau. Ich werde Ihnen bald bei diesem Thema helfen können!</i>",
                rep_loyers: "<b>⚖️ Was das Gesetz sagt (Französisches Recht):</b><br><br>- <b>Bürgerliches Gesetzbuch (Art. 1728)</b>: Die Hauptpflicht des Mieters ist es, \"den Mietpreis zu den vereinbarten Bedingungen zu zahlen\".<br>- <b>Gesetz vom 6. Juli 1989 (Art. 7)</b>: Der Mieter ist verpflichtet, \"die Miete und die umlagefähigen Nebenkosten zu den vereinbarten Bedingungen zu zahlen\".<br><br><b>🛠 Die 3 Schritte zur Reaktion:</b><br>1. Freundliche Erinnerung (Tag+5)<br>2. Mahnung per Einschreiben (Tag+15)<br>3. Zahlungsbefehl über einen Gerichtsvollzieher.",
                rep_depot: "<b>⚖️ Was das Gesetz sagt (Französisches Recht):</b><br><br>Die Rückgabe der Kaution ist streng geregelt in <b>Artikel 22 des Gesetzes vom 6. Juli 1989</b>.<br><br><b>⏱ Gesetzliche Rückgabefristen:</b><br>- <b>Maximal 1 Monat</b>, wenn das Auszugsprotokoll mit dem Einzugsprotokoll übereinstimmt.<br>- <b>Maximal 2 Monate</b>, wenn Schäden vorliegen.<br><br><b>⚠️ Achtung:</b><br>- Jeder Abzug muss belegt werden (Kostenvoranschläge oder Rechnungen).<br>- Bei Verzögerung fällt eine Strafe von 10% der Kaltmiete pro Verspätungsmonat an.",
                contact_q: "Möchten Sie für weitere Details zu Ihrer Situation kostenlos von einem Experten kontaktiert werden?",
                contact_oui: "✅ Ja, ich möchte kontaktiert werden",
                contact_non: "❌ Nein, danke",
                form_intro: "Perfekt, bitte füllen Sie dieses Formular aus und wir rufen Sie zurück:",
                form_nom: "Nachname",

                form_merci: "✅ Danke! Ihre Daten wurden erfolgreich gespeichert. Ein Berater wird sich in Kürze bei Ihnen melden."
            },
            it: {
                header: "🤖 Consulente Legale",
                disclaimer: "<br><br><i>* Avvertenza: Sono un assistente virtuale. Non sono un giurista né un avvocato. Queste informazioni sono fornite a titolo indicativo e non sostituiscono in alcun caso la consulenza personalizzata di un professionista legale.</i>",
                accueil: "Ciao! Sono il tuo consulente legale virtuale. Come posso aiutarti oggi? Seleziona il tuo profilo:",
                btn_proprio: "🏠 Proprietari locatori",
                btn_locataire: "🔑 Inquilini",
                btn_vendeur: "🤝 Venditori",
                btn_acheteur: "🛒 Acquirenti",

                menu_proprio: "Molto bene. Che problema riscontri con il tuo inquilino?",

                pb_depot: "💰 Restituzione del deposito cauzionale",
                pb_travaux: "🔨 Ripartizione dei lavori di riparazione",
                pb_degradations: "🏚️ Danni all'alloggio",
                pb_voisinage: "🔊 Disturbi anomali del vicinato",
                pb_assurance: "📄 Mancanza di assicurazione sulla casa",
                pb_sousloc: "🚫 Subaffitto non autorizzato",
                pb_refus: "🚪 Rifiuto di lasciare i locali",
                btn_retour_debut: "⬅️ Torna all'inizio",
                btn_retour_menu: "⬅️ Torna al menu precedente",
                btn_recommencer: "🔄 Ricomincia da capo",
                bientot: "<i>Questa sezione è in costruzione. Potrò aiutarti presto su questo argomento!</i>",
                rep_loyers: "<b>⚖️ Cosa dice la legge (Diritto francese):</b><br><br>- <b>Codice civile (Art. 1728)</b>: L'obbligo principale dell'inquilino è \"pagare il prezzo della locazione nei termini stabiliti\".<br>- <b>Legge del 6 luglio 1989 (Art. 7)</b>: L'inquilino è obbligato a \"pagare l'affitto e le spese recuperabili nei termini stabiliti\".<br><br><b>🛠 I 3 passi per reagire:</b><br>1. Sollecito amichevole (Giorno+5)<br>2. Messa in mora tramite raccomandata (Giorno+15)<br>3. Ingiunzione di pagamento tramite un Ufficiale Giudiziario.",
                rep_depot: "<b>⚖️ Cosa dice la legge (Diritto francese):</b><br><br>La restituzione del deposito cauzionale è strettamente regolata dall'<b>Articolo 22 della legge del 6 luglio 1989</b>.<br><br><b>⏱ Scadenze legali per la restituzione:</b><br>- <b>1 mese massimo</b> se l'inventario di uscita è conforme a quello di entrata.<br>- <b>2 mesi massimo</b> in caso di danni.<br><br><b>⚠️ Attenzione:</b><br>- Ogni trattenuta deve essere giustificata (preventivi o fatture).<br>- In caso di ritardo, si applica una penale del 10% dell'affitto (spese escluse) per ogni mese di ritardo.",

                form_intro: "Perfetto, compila questo modulo e ti richiameremo:",

        };

        // Fonction pour changer la langue
        function changerLangue() {
            const select = document.getElementById('lang-select');
            currentLang = select.value;
            document.getElementById('header-title').innerText = texts[currentLang].header;
            document.documentElement.lang = currentLang; // Met à jour la balise HTML
            
            // Efface la discussion et relance le bot
            chatBox.innerHTML = '';
            optionsContainer.innerHTML = '';
            etapeAccueil();
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = 'message ' + (sender === 'bot' ? 'bot-message' : 'user-message');
            if (text.includes('<div') || text.includes('<br>')) {
                div.innerHTML = text;
            } else {
                div.innerHTML = text.replace(/\n/g, '<br>'); 
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight; 
        }

        function showOptions(options) {
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerHTML = opt.label;
                btn.onclick = () => {
                    addMessage(opt.label, 'user'); 
                    optionsContainer.innerHTML = ''; 
                    setTimeout(opt.action, 500); 
                };
                optionsContainer.appendChild(btn);
            });
        }

        // --- ARBORESCENCE DU BOT (Utilisant le dictionnaire) ---

        function etapeAccueil() {
            addMessage(texts[currentLang].accueil, 'bot');
            showOptions([
                { label: texts[currentLang].btn_proprio, action: etapeProprietaire },
                { label: texts[currentLang].btn_locataire, action: () => afficherBientot() },
                { label: texts[currentLang].btn_vendeur, action: () => afficherBientot() },
                { label: texts[currentLang].btn_acheteur, action: () => afficherBientot() },
                { label: texts[currentLang].btn_succession, action: () => afficherBientot() }
            ]);
        }

        function etapeProprietaire() {
            addMessage(texts[currentLang].menu_proprio, 'bot');
            showOptions([
                { label: texts[currentLang].pb_loyers, action: repLoyersImpayes },
                { label: texts[currentLang].pb_depot, action: repDepotGarantie },
                { label: texts[currentLang].pb_travaux, action: () => afficherBientot() },
                { label: texts[currentLang].pb_degradations, action: () => afficherBientot() },
                { label: texts[currentLang].pb_voisinage, action: () => afficherBientot() },
                { label: texts[currentLang].pb_assurance, action: () => afficherBientot() },
                { label: texts[currentLang].pb_sousloc, action: () => afficherBientot() },
                { label: texts[currentLang].pb_refus, action: () => afficherBientot() },
                { label: texts[currentLang].btn_retour_debut, action: etapeAccueil }
            ]);
        }

        function proposerContact(actionRetour) {
            addMessage(texts[currentLang].contact_q, 'bot');
            showOptions([
                { label: texts[currentLang].contact_oui, action: () => afficherFormulaire(actionRetour) },
                { label: texts[currentLang].contact_non, action: () => afficherOptionsFin(actionRetour) }
            ]);
        }

        function afficherFormulaire(actionRetour) {
            const formHTML = `
                ${texts[currentLang].form_intro}
                <div class="chat-form">
                    <input type="text" id="form-nom" placeholder="${texts[currentLang].form_nom}">
                    <input type="text" id="form-prenom" placeholder="${texts[currentLang].form_prenom}">
                    <input type="tel" id="form-tel" placeholder="${texts[currentLang].form_tel}">
                    <input type="email" id="form-email" placeholder="${texts[currentLang].form_email}">
                    <button class="btn-envoyer" id="btn-submit" onclick="validerFormulaire()">${texts[currentLang].form_btn}</button>
                </div>
            `;
            addMessage(formHTML, 'bot');
            optionsContainer.innerHTML = ''; 
            window.actionRetourActuelle = actionRetour;
        }

        window.validerFormulaire = function() {
            const btn = document.getElementById('btn-submit');
            if(btn) { 
                btn.disabled = true; 
                btn.innerText = texts[currentLang].form_sending; 
            }

            addMessage(texts[currentLang].form_user, 'user');
            
            setTimeout(() => {
                addMessage(texts[currentLang].form_merci, 'bot');
                afficherOptionsFin(window.actionRetourActuelle);
            }, 1000);
        }

        function afficherOptionsFin(actionRetour) {
            showOptions([
                { label: texts[currentLang].btn_retour_menu, action: actionRetour },
                { label: texts[currentLang].btn_recommencer, action: etapeAccueil }
            ]);
        }

        function repLoyersImpayes() {
            addMessage(texts[currentLang].rep_loyers + texts[currentLang].disclaimer, 'bot');
            setTimeout(() => proposerContact(etapeProprietaire), 1000);
        }

        function repDepotGarantie() {
            addMessage(texts[currentLang].rep_depot + texts[currentLang].disclaimer, 'bot');
            setTimeout(() => proposerContact(etapeProprietaire), 1000);
        }

        function afficherBientot() {
            addMessage(texts[currentLang].bientot, 'bot');
            showOptions([
                { label: texts[currentLang].btn_retour_debut, action: etapeAccueil }
            ]);
        }

        // Initialisation
        document.getElementById('header-title').innerText = texts[currentLang].header;
        etapeAccueil();
    </script>
</body>
</html>
